<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Heart Animation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="heartCanvas"></canvas>
    <script src="script.js"></script>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];
        const particleCount = 450; // ចំនួនភាគល្អិតខ្សែកាន់តែច្រើន កាន់តែស្អាត
        let pulseTime = 0;

        // រូបមន្តគណនាទីតាំងបេះដូង
        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * scale, y: -y * scale }; // -y ពីព្រោះ Canvas គិតទិសដៅចុះក្រោមជាបូក
        }

        // បង្កើតភាគល្អិតនីមួយៗ
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                // កំណត់មុំគន្លងជុំវិញបេះដូង
                this.t = Math.random() * Math.PI * 2;

                // ល្បឿនរត់ និងកម្លាំងញ័រ
                this.speed = 0.02 + Math.random() * 0.03;
                this.randomOffset = (Math.random() - 0.5) * 15;

                this.history = [];
                this.maxHistory = 20; // ប្រវែងខ្សែរត់តាមក្រោយ (Trail)
            }

            update(centerX, centerY, scale) {
                this.t += this.speed;
                if (this.t > Math.PI * 2) this.t = 0;

                // យកទីតាំងពីគំរូគណិតវិទ្យា រួចបន្ថែមភាពរញ៉េរញ៉ៃ (Noise/Electric effect)
                const basePoint = getHeartPoint(this.t, scale);
                const noiseX = (Math.random() - 0.5) * 12;
                const noiseY = (Math.random() - 0.5) * 12;

                const currentX = centerX + basePoint.x + noiseX;
                const currentY = centerY + basePoint.y + noiseY;

                // រក្សាទុកប្រវត្តិនៃទីតាំងដើម្បីបង្កើតខ្សែព្រិលៗ
                this.history.push({ x: currentX, y: currentY });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);

                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                // បង្កើតពណ៌ក្រហមអគ្គិសនីដេញពន្លឺ (Electric Red glow)
                ctx.strokeStyle = 'rgba(255, 0, 50, ' + (Math.random() * 0.4) + ')';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        // បង្កើតដុំភាគល្អិតចូលក្នុង Array
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            // បង្កើតចលនារលត់ស្រាលៗនៅផ្ទៃក្រោយ (Motion Trail Effect)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // ចលនាបេះដូងលោតញាប់ៗ (Pulse)
            const pulse = 1 + Math.sin(pulseTime) * 0.08;
            const scale = 12 * pulse;

            // បច្ចុប្បន្នភាព និងគូរភាគល្អិត
            particles.forEach(p => {
                p.update(centerX, centerY, scale);
                p.draw();
            });

            // គូរគ្រាប់ចុចភ្លឺៗព័ទ្ធជុំវិញគន្លងបេះដូងខាងក្រៅ (Outer Dot Ring)
            for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                const point = getHeartPoint(angle, scale * 1.05);
                ctx.fillStyle = 'rgba(255, 100, 120, 0.6)';
                ctx.fillRect(centerX + point.x + (Math.random() - 0.5) * 4, centerY + point.y + (Math.random() - 0.5) * 4, 2, 2);
            }

            pulseTime += 0.15; // ល្បឿននៃការលោតបេះដូង
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
