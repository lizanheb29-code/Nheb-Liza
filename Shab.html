<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Orca Whale Animation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #e0e0e0;
            /* бһ–бһҺбҹҢбһ•бҹ’бһ‘бҹғбһҒбһ¶бһ„бһҖбҹ’бһҡбҹ„бһҷбһҠбһјбһ…бһҖбҹ’бһ“бһ»бһ„бһңбһёбһҠбҹҒбһўбһј */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
            /* бһ”бҹ’бһҠбһјбһҡбһҡбһјбһ”бһҡбһ¶бһ„бһҖбһҺбҹ’бһҠбһ»бһҡ */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="whaleCanvas"></canvas>

    <script src="script.js"></script>
    <script>
        const canvas = document.getElementById("whaleCanvas");
        const ctx = canvas.getContext("2d");

        // бһҖбҹҶбһҺбһҸбҹӢбһ‘бҹҶбһ бҹҶ Canvas бһұбҹ’бһҷбһ–бҹҒбһүбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһҖбһҺбҹ’бһҠбһ»бһҡ (Mouse Position)
        const mouse = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2
        };

        window.addEventListener("mousemove", (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҡбһ”бһҹбҹӢбһҸбҹ’бһҡбһёбһ”бһ¶бһЎбҹӮбһ“ (Whale Structure)
        class Whale {
            constructor() {
                this.x = window.innerWidth / 2;
                this.y = window.innerHeight / 2;
                this.angle = 0;
                this.fps = 30;
                this.easy = 6; // бһӣбҹ’бһ”бһҝбһ“бһҠбҹҒбһүбһҸбһ¶бһҳ (Easing) бһҠбһјбһ…бһҖбҹ’бһ“бһ»бһ„бһңбһёбһҠбҹҒбһўбһј
                this.maxSpeed = 15;

                // бһҖбҹҶбһҺбһҸбҹӢбһҖбһ„бҹӢ бһ¬бһҖбһ„бҹӢбһҹбһ“бҹ’бһӣбһ¶бһҖбҹӢбһҡбһ”бһҹбҹӢбһҒбҹ’бһӣбһҪбһ“бһҸбҹ’бһҡбһё (Segments)
                this.numSegments = 12;
                this.segments = [];
                for (let i = 0; i < this.numSegments; i++) {
                    this.segments.push({
                        x: this.x,
                        y: this.y,
                        radius: 30 - (i * 2) // бһҖбһ“бҹ’бһ‘бһ»бһҷбһҡбһҪбһҳбһҸбһјбһ…бһ‘бҹ…бҹ—
                    });
                }
            }

            update() {
                // бһӮбһҺбһ“бһ¶бһұбҹ’бһҷбһҖбҹ’бһ”бһ¶бһӣбһҸбҹ’бһҡбһёбһҠбҹҒбһүбһҸбһ¶бһҳбһҖбһҺбҹ’бһҠбһ»бһҡбһҠбҹ„бһҷбһ‘бһ“бҹӢбһ—бҹ’бһӣбһ“бҹӢ
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                this.angle = Math.atan2(dy, dx);

                this.x += dx / this.easy;
                this.y += dy / this.easy;

                // бһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бһ—бһ¶бһ–бһ•бҹ’бһ“бҹӮбһҖбһ•бҹ’бһҹбҹҒбһ„бҹ—бһ“бҹғбһҒбҹ’бһӣбһҪбһ“ (Inverse Kinematics)
                this.segments[0].x = this.x;
                this.segments[0].y = this.y;

                for (let i = 1; i < this.numSegments; i++) {
                    let prev = this.segments[i - 1];
                    let curr = this.segments[i];

                    let sDx = prev.x - curr.x;
                    let sDy = prev.y - curr.y;
                    let dist = Math.sqrt(sDx * sDx + sDy * sDy);
                    let minDist = 15; // бһ…бһҳбҹ’бһ„бһ¶бһҷбһҡбһңбһ¶бһ„бһҹбһ“бҹ’бһӣбһ¶бһҖбҹӢбһ“бһёбһҳбһҪбһҷбҹ—

                    if (dist > minDist) {
                        let angle = Math.atan2(sDy, sDx);
                        curr.x = prev.x - Math.cos(angle) * minDist;
                        curr.y = prev.y - Math.sin(angle) * minDist;
                    }
                }
            }

            draw() {
                // бһӮбһјбһҡбһҡбһјбһ”бһҡбһ¶бһ„бһҸбҹ’бһҡбһёбһ”бһ¶бһЎбҹӮбһ“ (бһҒбҹ’бһҳбҹ… бһ“бһ·бһ„ бһҹ)
                ctx.save();

                // бһӮбһјбһҡбһ–бҹ’бһҡбһ»бһҷбһ…бҹҶбһ бҹҖбһ„ бһ“бһ·бһ„бһҖбһ“бҹ’бһ‘бһ»бһҷ (бһҹбһ¶бһҳбһүбҹ’бһү)
                this.drawFins();

                // бһӮбһјбһҡбһҒбҹ’бһӣбһҪбһ“бһҸбҹ’бһҡбһёбһҠбҹ„бһҷбһҸбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ–бһёбһҹбһ“бҹ’бһӣбһ¶бһҖбҹӢбһҳбһҪбһҷбһ‘бҹ…бһҹбһ“бҹ’бһӣбһ¶бһҖбҹӢбһҳбһҪбһҷ
                ctx.fillStyle = "#1a1a1a"; // бһ–бһҺбҹҢбһҒбҹ’бһҳбҹ…бһ“бҹғбһҒбҹ’бһӣбһҪбһ“бһҸбҹ’бһҡбһё
                for (let i = 0; i < this.numSegments; i++) {
                    let seg = this.segments[i];
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, seg.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // бһӮбһјбһҡбһ–бҹ„бҹҮбһ–бһҺбҹҢбһҹ (White Belly Patch)
                ctx.fillStyle = "#ffffff";
                for (let i = 0; i < this.numSegments - 4; i++) {
                    let seg = this.segments[i];
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, seg.radius * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            drawFins() {
                // бһӮбһјбһҡбһ–бҹ’бһҡбһ»бһҷбһҶбҹ’бһңбҹҒбһ„бһҹбҹ’бһҸбһ¶бҹҶ бһҠбҹ„бһҷбһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһҳбһ»бҹҶбһҖбҹ’бһ”бһ¶бһӣбһҸбҹ’бһҡбһё
                let head = this.segments[0];
                ctx.fillStyle = "#1a1a1a";

                // бһ–бҹ’бһҡбһ»бһҷбһҶбҹ’бһңбҹҒбһ„
                ctx.beginPath();
                ctx.arc(head.x + Math.cos(this.angle + Math.PI / 2) * 25, head.y + Math.sin(this.angle + Math.PI / 2) * 25, 12, 0, Math.PI * 2);
                ctx.fill();

                // бһ–бҹ’бһҡбһ»бһҷбһҹбҹ’бһҸбһ¶бҹҶ
                ctx.beginPath();
                ctx.arc(head.x + Math.cos(this.angle - Math.PI / 2) * 25, head.y + Math.sin(this.angle - Math.PI / 2) * 25, 12, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // бһ”бһ„бҹ’бһҖбһҫбһҸ Object бһҸбҹ’бһҡбһёбһ”бһ¶бһЎбҹӮбһ“
        const orca = new Whale();

        // бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ Loop бһӮбҹҶбһ“бһјбһҡбһҮбһёбһңбһ…бһӣ (Animation Loop)
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            orca.update();
            orca.draw();

            requestAnimationFrame(animate);
        }

        // бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҠбһҫбһҳбһӣбҹҒбһ„
        animate();
    </script>
</body>

</html>
