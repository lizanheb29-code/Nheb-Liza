<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Animation</title>
    <link rel="stylesheet" href="https://rerofya.github.io/resources/flower.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111a1e;
            /* бһ–бһҺбҹҢбһҒбҹҖбһңбһҖбҹ’бһҡбһҳбҹүбҹ…бһ„бһ„бһ№бһҸбһҠбһјбһ…бһҖбҹ’бһ“бһ»бһ„бһңбһёбһҠбҹҒбһўбһј */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* бһұбҹ’бһҷбһ•бҹ’бһҖбһ¶бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҠбһ»бҹҮбһ…бҹҒбһүбһ–бһёбһ•бҹ’бһ“бҹӮбһҖбһҒбһ¶бһ„бһҖбҹ’бһҡбҹ„бһҳбһ“бҹғбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ */
            overflow: hidden;
            padding-bottom: 50px;
        }

        #flower-container {
            width: 100%;
            max-width: 600px;
            height: 500px;
            position: relative;
        }
    </style>
</head>

<body>

    <div id="flower-container"></div>

    <script src="https://rerofya.github.io/resources/flower.js"></script>
    <script src="script.js"></script>
    <script>
        // бһ”бһүбҹ’бһҮбһ¶бһұбҹ’бһҷбһ•бҹ’бһҖбһ¶бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ“бҹ…бһ–бҹҒбһӣбһҠбҹӮбһӣбһ‘бҹҶбһ–бҹҗбһҡ Web бһҠбһҫбһҡбһ–бҹҒбһүбһӣбҹҒбһү (Loaded)
        window.addEventListener('DOMContentLoaded', () => {
            // бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһ”бһҺбҹ’бһҺбһ¶бһӣбҹҗбһҷбһҡбһҸбҹӢбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷ бһңбһ¶бһ“бһ№бһ„бһ”бһ„бҹ’бһҖбһҫбһҸбһ…бһӣбһ“бһ¶бһ•бҹ’бһҖбһ¶бһҠбҹ„бһҷбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһ…бһјбһӣбһҖбҹ’бһ“бһ»бһ„ #flower-container
            console.log("Flower Animation is starting...");
        });
    </script>
</body>

</html>
