<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Trading Chart Dashboard</title>
    <link rel="stylesheet" href="trad.CSS">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="chart-wrapper">
        <div class="chart-header">
            <div  class="pair-info">
                <span class="pair-name">USD / JPY</span>
                <span class="timeframe">4h•FXCM</span>
            </div>
            <div class="live-price-container">
                <span class="live-price">150.333</span>
                <span class="countdown">01:31:05</span>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="tradingChart"></canvas>
        </div>
        <div class="chart-watermark">
            <h2>Still Trader</h2>
            <p>Smart Money Concepts (SMC) Analysis Dashboard</p>
            <div class="promo-badge">1.5 RR Strategy Active</div>
        </div>
    </div>
    <script>const canvas = document.getElementById('tradingChart');
const ctx = canvas.getContext('2d');

// Set up sharp canvas scaling for high DPI displays
function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    drawChart();
}

// Simulated SMC Chart Data Structure (Mimicking the pattern of the image)
const candles = [
    // Step 1: Initial base and rise
    { x: 40,  open: 144.2, close: 143.5, high: 144.5, low: 143.2, type: 'bear' },
    { x: 60,  open: 143.5, close: 144.8, high: 145.0, low: 143.3, type: 'bull' },
    { x: 80,  open: 144.8, close: 144.0, high: 145.2, low: 143.8, type: 'bear' },
    { x: 100, open: 144.0, close: 145.8, high: 146.0, low: 143.9, type: 'bull' },
    { x: 120, open: 145.8, close: 146.9, high: 147.2, low: 145.5, type: 'bull' },
    
    // Step 2: First pull back to Demand Zone
    { x: 140, open: 146.9, close: 146.1, high: 147.0, low: 145.8, type: 'bear' },
    { x: 160, open: 146.1, close: 145.7, high: 146.4, low: 145.5, type: 'bear' },
    { x: 180, open: 145.7, close: 147.2, high: 147.5, low: 145.6, type: 'bull' },
    { x: 200, open: 147.2, close: 148.1, high: 148.4, low: 147.0, type: 'bull' },
    
    // Step 3: Big peak & Liquidity pool build up
    { x: 220, open: 148.1, close: 149.2, high: 149.5, low: 148.0, type: 'bull' },
    { x: 240, open: 149.2, close: 148.5, high: 149.4, low: 148.3, type: 'bear' },
    { x: 260, open: 148.5, close: 149.0, high: 149.3, low: 148.1, type: 'bull' },
    { x: 280, open: 149.0, close: 147.8, high: 149.1, low: 147.5, type: 'bear' },
    { x: 300, open: 147.8, close: 148.2, high: 148.6, low: 147.4, type: 'bull' },
    
    // Step 4: Drop down deep creating CHOCh structural shift
    { x: 320, open: 148.2, close: 146.8, high: 148.3, low: 146.5, type: 'bear' },
    { x: 340, open: 146.8, close: 146.0, high: 147.0, low: 145.8, type: 'bear' },
    { x: 360, open: 146.0, close: 145.6, high: 146.2, low: 145.4, type: 'bear' },
    
    // Step 5: Clean reversal from the major Demand Zone
    { x: 380, open: 145.6, close: 146.8, high: 147.0, low: 145.5, type: 'bull' },
    { x: 400, open: 146.8, close: 147.3, high: 147.6, low: 146.5, type: 'bull' },
    { x: 420, open: 147.3, close: 146.9, high: 147.5, low: 146.7, type: 'bear' },
    { x: 440, open: 146.9, close: 148.2, high: 148.4, low: 146.8, type: 'bull' },
    { x: 460, open: 148.2, close: 147.9, high: 148.5, low: 147.6, type: 'bear' },
    { x: 480, open: 147.9, close: 149.1, high: 149.4, low: 147.8, type: 'bull' },
    { x: 500, open: 149.1, close: 150.5, high: 151.0, low: 149.0, type: 'bull' }
];

// Map real-world prices to local canvas vertical coordinate spaces
function getPriceY(price) {
    const maxPrice = 151.5;
    const minPrice = 142.5;
    return canvas.height - ((price - minPrice) / (maxPrice - minPrice)) * canvas.height;
}

function drawChart() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Draw Grid Lines & Price Axis Sidebar Values
    ctx.strokeStyle = '#2a2e39';
    ctx.lineWidth = 1;
    ctx.font = '11px monospace';
    ctx.fillStyle = '#848e9c';
    
    for (let p = 143; p <= 151; p += 1) {
        let y = getPriceY(p);
        // Horizontal grid line
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width - 60, y);
        ctx.stroke();
        
        // Right side price label
        ctx.fillText(p.toFixed(3), canvas.width - 50, y + 4);
    }

    // 2. Highlight SMC Demand Gray Zones
    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
    
    // Low Demand Area
    ctx.fillRect(30, getPriceY(144.2), 110, getPriceY(143.2) - getPriceY(144.2));
    // Mid Pullback Demand Zone
    ctx.fillRect(130, getPriceY(146.4), 80, getPriceY(145.5) - getPriceY(146.4));
    // Core Institutional Reversal Zone
    ctx.fillRect(310, getPriceY(146.2), 80, getPriceY(145.4) - getPriceY(146.2));

    // 3. Render Market Candlesticks
    candles.forEach(candle => {
        let x = candle.x + 40; // shift right to accommodate chart layout
        let yOpen = getPriceY(candle.open);
        let yClose = getPriceY(candle.close);
        let yHigh = getPriceY(candle.high);
        let yLow = getPriceY(candle.low);
        
        // Color definitions based on direction
        const bullColor = '#ff9f43';  // Orange
        const bearColor = '#00d2d3';  // Cyan / Teal
        ctx.strokeStyle = candle.type === 'bull' ? bullColor : bearColor;
        ctx.fillStyle = candle.type === 'bull' ? bullColor : bearColor;
        
        // Draw Candle Wick line
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, yHigh);
        ctx.lineTo(x, yLow);
        ctx.stroke();
        
        // Draw Candle Body block
        ctx.lineWidth = 1;
        let bodyWidth = 12;
        ctx.fillRect(x - bodyWidth/2, Math.min(yOpen, yClose), bodyWidth, Math.abs(yOpen - yClose));
    });

    // 4. Draw Break of Structure (BOS) & Trend Lines
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    
    // Break of Structure line
    let bosY = getPriceY(149.3);
    ctx.beginPath();
    ctx.moveTo(220, bosY);
    ctx.lineTo(480, bosY);
    ctx.stroke();

    // CHOCH Support segment
    let chochY = getPriceY(147.4);
    ctx.beginPath();
    ctx.moveTo(290, chochY);
    ctx.lineTo(340, chochY);
    ctx.stroke();

    // 5. Annotate Structure Metrics text labels onto Canvas
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 11px Arial';
    ctx.fillText('Break of Structure', 310, bosY - 8);
    ctx.fillText('CHOCH', 300, chochY - 8);
    
    // Strategy Entry Label Flags
    ctx.fillStyle = '#ff6b6b';
    ctx.fillText('▲ Buy 1:5 RR', 170, getPriceY(145.9));
    ctx.fillText('▲ Buy 1:5 RR', 410, getPriceY(147.0));

    ctx.fillStyle = '#f0a500';
    ctx.font = '10px Arial';
    ctx.fillText('Order Flow', 60, getPriceY(145.4));
    ctx.fillText('Demand Zone', 65, getPriceY(143.0));
    ctx.fillText('Liquidity Pool', 230, getPriceY(147.1));
}

// Live update listener hooks
window.addEventListener('resize', resizeCanvas);
document.addEventListener('DOMContentLoaded', resizeCanvas);</script>
</body>

</html>
