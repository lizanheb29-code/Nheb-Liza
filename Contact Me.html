<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Contact-Wrapper{
            background-color: #e1b12c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 50px 0;
           
            
        }
        .Contact-card{
            background-color: #ffffff;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .profile-box{
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #00a8ff;
            overflow: hidden;
        }
        .profile-img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-name{
            color: #2c3e50;
            font-size: 24px;
        }
        .contact-info{
            font-size: 15px;
            color: #333333;
            line-height: 1.6;
            padding: 10px;
        }
        .contact-info strong{
            color: #000000;
        }
        .btn-contact-blue{
            background-color: #00a8ff ! important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 12px !important;
            font-size: 15px;
            transition: baground 0.2s ease-in-out;
        }
        .btn-contact-blue:hover{
            background-color: #0097e6 !important;
        }
        .Contact-Wrapper{
            margin: 0;
            display: grid;
            padding-left: center;
            min-height: 100vh;
            background-color: #f3c623;
            justify-content: center;
            font-family: sans-serif;
            
        }
    </style>
</head>
<body>
    <section class="Contact-Wrapper">
        <div class="container d-flex justify-content-center align-items-center">
            <div class="card Contact-card border-0 p-4 text-center">
                <div class="profile-box mx-auto mb-3">
                    <img src="image/4.png" alt="Liza Nheb" class="profile-img">
                </div>
                <h3 class="profile-name fw-bold mb-1">liza Nheb</h3>
                <p class="profile-title text-muted small mb-4">Web Developer</p>

                <div class="contact-info text-start mb-4">
                    <p class="mb-2"><strong>Email:</strong>LizaNheb29@gmail.com</p>
                    <p class="mb-2"><strong>Phone:</strong>0885770949</p>
                    <p class="mb-0 mt-3 fw-medium text-dark">Phnom Penh</p>
                </div>
                <button class="btn btn-contact-blue w-100 py-2 fw-bold">Contact Me</button>
            </div>
        </div>
    </section>
</body>
</html>
