<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrysty JKT48 Poster Tribute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Montserrat:wght@400;700;900&family=Oswald:wght@700&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="hypong.CSS">
</head>

<body>
      <div class="poster-container">
        <div class="tape tape-top-left">
            <span class="tape-text-large">CHRYSTY</span>
            <span class="tape-text-small">JKT48 7THGEN</span>
        </div>
        <div class="inner-frame">
            <div class="vertical-bg-text">JKT48 7THGEN</div>
            <div class="top-right-bg-text">JKT48
                <span>7TH GEN</span>
            </div>
            <div class="sub-badge-left">
                <span class="star">✦</span>
                <p>NEW<br>NEW<br>GENDER ACTION<br>STORY</p>
                <div class="mini-blocks"><span></span><span></span><span></span></div>
            </div>
            <div class="handwritten-text">Capture<br>Moment
            <div class="heart-icon">♥️</div></div>
            <div class="character-image-container">
                <div class="character-glow"></div>
            </div>
            <div class="logo-badge-bottom-left">
                <div class="globe-icon">🌐</div>
                <div class="badge-title">JKT48</div>
                <div class="badge-subtitle">7TH GENERATION</div>
                <div class="barcode">||||| |  | ||</div>
            </div>
            <div class="motto-text">
                <span class="star">✦</span>
                <p>DREAM IT.<br>SHOOT IT.<br>MAKE IT REAL.</p>
            </div>
            <div class="main-nameplate">
                <div class="name-section">CHRYSTY</div>
                <div class="group-section">JKT48</div>
            </div>
        </div>
        <div class="tape tape-bottom-right">
            <span class="tape-text-large">CHRYSTY</span>
            <div class="tape-sub-flex">
                <span>🌐 JKT48 7TH GEN</span>
            </div>
        </div>
      </div>
</body>

</html>
