<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Blackhole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050505;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ១. បង្កើត Scene, Camera និង Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ២. បង្កើតក្រុមស្នូលកណ្តាល (Core Group)
        const coreGroup = new THREE.Group();
        scene.add(coreGroup);

        // បង្កើតដុំខ្មៅចំកណ្តាល (Black Hole Singularity)
        const sphereGeo = new THREE.SphereGeometry(4.25, 64, 64);
        const blackHoleMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(sphereGeo, blackHoleMat);
        coreGroup.add(blackHole);

        // ៣. បង្កើតភាគល្អិតពន្លឺជុំវិញ (Accretion Disk)
        const instanceCount = 5000;
        const streakGeo = new THREE.CylinderGeometry(0.01, 0.12, 2.2, 3);
        streakGeo.rotateX(Math.PI / 2); 

        const streakMat = new THREE.MeshBasicMaterial({
            color: 0xffaa44, 
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending 
        });

        const instancedMesh = new THREE.InstancedMesh(streakGeo, streakMat, instanceCount);
        coreGroup.add(instancedMesh);

        const dummy = new THREE.Object3D();
        const particleData = [];

        for (let i = 0; i < instanceCount; i++) {
            const radius = 6 + Math.random() * 12;
            const angle = Math.random() * Math.PI * 2;
            const speed = (0.01 + Math.random() * 0.02) * (8 / radius); 
            const y = (Math.random() - 0.5) * 0.5; 

            particleData.push({ radius, angle, speed, y });
        }

        camera.position.z = 25;
        camera.position.y = 5;
        camera.lookAt(0, 0, 0);

        // ៤. អនុគមន៍គណនាចលនាបង្វិល (Animation Loop) -> ចំណុចនេះដែលកូដចាស់របស់អ្នកខ្វះ
        function animate() {
            requestAnimationFrame(animate);

            for (let i = 0; i < instanceCount; i++) {
                const data = particleData[i];
                data.angle += data.speed; 

                const x = Math.cos(data.angle) * data.radius;
                const z = Math.sin(data.angle) * data.radius;

                dummy.position.set(x, data.y, z);
                dummy.rotation.set(0, -data.angle, 0); 
                
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;

            coreGroup.rotation.x = 0.2;
            coreGroup.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        // ចាប់ផ្តើមដំណើរការ
        animate();

        // កែប្រែទំហំពេលពង្រីក screen
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
