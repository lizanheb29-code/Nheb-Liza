<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Dino Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7f7f7;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 200px;
        }

        .card {
            width: 100%;
            height: 100%;
            border-bottom: 2px solid #535353;
            position: relative;
            overflow: hidden;
        }

        #dino {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        /* бһ”бһ“бҹ’бһҗбҹӮбһҳ Class бһ“бҹҒбҹҮбһ–бҹҒбһӣбһҠбһ¶бһҷбһҺбһјбһҹбҹҗбһҡбһӣбҹ„бһҸ */
        .jump {
            animation: dinoJump 0.5s linear;
        }

        #kaktus {
            width: 25px;
            height: 50px;
            position: absolute;
            bottom: 0;
            right: -30px;
        }

        /* бһ”бһ“бҹ’бһҗбҹӮбһҳ Class бһ“бҹҒбҹҮбһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһҠбһҫбһҳбһҠбҹҶбһ”бһ„бһҷбһҖбҹ’бһҹбһҡбһҸбҹӢбһ–бһёбһҹбҹ’бһҸбһ¶бҹҶбһ‘бҹ…бһҶбҹ’бһңбҹҒбһ„ */
        .kaktus-move {
            animation: kaktusRun 1.5s linear infinite;
        }

        #startBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            cursor: pointer;
            background-color: #535353;
            color: white;
            border: none;
            border-radius: 4px;
        }

        /* бһӮбһ“бҹ’бһӣбһ„бһ…бһӣбһ“бһ¶бһӣбҹ„бһҸбһҡбһ”бһҹбҹӢбһҠбһ¶бһҷбһҺбһјбһҹбҹҗбһҡ */
        @keyframes dinoJump {
            0% {
                bottom: 0;
            }

            50% {
                bottom: 80px;
            }

            100% {
                bottom: 0;
            }
        }

        /* бһӮбһ“бҹ’бһӣбһ„бһ…бһӣбһ“бһ¶бһҡбһҸбҹӢбһҡбһ”бһҹбҹӢбһҠбһҫбһҳбһҠбҹҶбһ”бһ„бһҷбһҖбҹ’бһҹ */
        @keyframes kaktusRun {
            0% {
                right: -30px;
            }

            100% {
                right: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img id="dino" src="https://rerofya.github.io/resources/dino.svg" alt="dino">
            <img id="kaktus" src="https://rerofya.github.io/resources/cactus.svg" alt="cactus">
            <button id="startBtn">Start</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const dino = document.getElementById('dino');
const kaktus = document.getElementById('kaktus');
const startBtn = document.getElementById('startBtn');

let isAlive = false;

// бҹЎ. бһўбһ“бһ»бһӮбһҳбһ“бҹҚбһ”бһүбҹ’бһҮбһ¶бһұбҹ’бһҷбһҠбһ¶бһҷбһҺбһјбһҹбҹҗбһҡбһӣбҹ„бһҸ
function jump() {
    // бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҗбһ¶бһҸбһҫбһңбһ¶бһӣбҹ„бһҸбһҡбһҪбһ…бһ бһҫбһҷбһ¬бһ“бҹ… бһ”бһҫбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһ‘бҹҒбһ‘бһҫбһ”бһұбҹ’бһҷбһӣбҹ„бһҸ
    if (!dino.classList.contains('jump')) {
        dino.classList.add('jump');
        
        // бһӣбһ»бһ” Class jump бһ…бҹҒбһүбһңбһ·бһүбһҖбҹ’бһҡбҹ„бһҷбһ–бҹҒбһӣбһӣбҹ„бһҸбһ…бһ”бҹӢ (500ms) бһҠбһҫбһҳбҹ’бһ”бһёбһўбһ¶бһ…бһӣбҹ„бһҸбһҳбҹ’бһҸбһ„бһ‘бҹҖбһҸбһ”бһ¶бһ“
        setTimeout(() => {
            dino.classList.remove('jump');
        }, 500);
    }
}

// бҹў. бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһ бҹ’бһӮбҹҒбһҳбһ–бҹҒбһӣбһ…бһ»бһ…бһ”бҹҠбһјбһҸбһ»бһ„ Start
startBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // бһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһ»бҹҶбһұбҹ’бһҷбһҮбһ¶бһ“бҹӢбһӮбҹ’бһ“бһ¶бһҮбһ¶бһҳбһҪбһҷбһҖбһ¶бһҡбһ…бһ»бһ…бһӣбҹ„бһҸ
    isAlive = true;
    startBtn.style.display = 'none'; // бһӣбһ¶бһҖбҹӢбһ”бҹҠбһјбһҸбһ»бһ„бһӣбҹҒбһ„
    kaktus.classList.add('kaktus-move'); // бһұбҹ’бһҷбһҠбһҫбһҳбһҠбҹҶбһ”бһ„бһҷбһҖбҹ’бһҹбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҡбһҸбҹӢ
});

// бҹЈ. бһ”бһ“бҹ’бһҗбҹӮбһҳбһҮбһҳбҹ’бһҡбһҫбһҹбҹ– бһ…бһ»бһ… Spacebar бһӣбһҫ Keyboard бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӣбҹ„бһҸ
document.addEventListener('keydown', (event) => {
    // бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ‘бһ¶бҹҶбһ„бһ”бҹҠбһјбһҸбһ»бһ„ Spacebar (Space) бһ“бһ·бһ„ бһ–бҹ’бһҡбһҪбһүбһЎбһҫбһ„бһӣбһҫ (ArrowUp)
    if ((event.code === 'Space' || event.code === 'ArrowUp') && isAlive) {
        event.preventDefault(); // бһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһ»бҹҶбһұбҹ’бһҷбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһўбһјбһҹбһ…бһ»бҹҮбһҖбҹ’бһҡбҹ„бһҳбһ–бҹҒбһӣбһ…бһ»бһ… Spacebar
        jump();
    }
});

// бҹӨ. бһ”бһ“бҹ’бһҗбҹӮбһҳбһҮбһҳбҹ’бһҡбһҫбһҹбҹ– бһ…бһ»бһ… Click бһҳбҹүбҹ… бһ¬ Touch бһӣбһҫбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҸбһ бҹ’бһӮбҹҒбһҳ бһҖбҹҸбһўбһ¶бһ…бһӣбҹ„бһҸбһ”бһ¶бһ“бһҠбҹӮбһҡ
document.querySelector('.card').addEventListener('click', () => {
    if (isAlive) {
        jump();
    }
});

// бҹҘ. бһўбһ“бһ»бһӮбһҳбһ“бҹҚбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҖбһ¶бһҡбһ”бһ»бһҖбһӮбҹ’бһ“бһ¶ (Check Game Over)
const checkCollision = setInterval(() => {
    if (!isAlive) return;

    // бһҷбһҖбһ‘бһёбһҸбһ¶бҹҶбһ„бһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бһҡбһ”бһҹбҹӢбһҸбһҪбһўбһ„бҹ’бһӮбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһӣбһҫбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ
    const dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue('bottom'));
    const kaktusRight = parseInt(window.getComputedStyle(kaktus).getPropertyValue('right'));
    
    // бһӮбһҺбһ“бһ¶бһ‘бһёбһҸбһ¶бҹҶбһ„бһ–бһёбһҹбҹ’бһҸбһ¶бҹҶбһ‘бҹ…бһҶбҹ’бһңбҹҒбһ„ (бһ”бҹҶбһ”бҹ’бһӣбҹӮбһ„бһ‘бҹ…бһҮбһ¶бһ‘бһёбһҸбһ¶бҹҶбһ„ Left бһ’бҹҖбһ”бһ“бһ№бһ„бһ”бҹ’бһҡбһңбҹӮбһ„ Container 600px)
    const containerWidth = 600;
    const kaktusLeft = containerWidth - kaktusRight - 25; // 25 бһӮбһәбһҮбһ¶бһ‘бҹҶбһ бҹҶбһ‘бһ‘бһ№бһ„бһҡбһ”бһҹбҹӢбһҠбҹҶбһ”бһ„бһҷбһҖбҹ’бһҹ

    // бһ”бһҫбһҠбһҫбһҳбһҠбҹҶбһ”бһ„бһҷбһҖбҹ’бһҹбһҡбһҸбҹӢбһҳбһҖбһҠбһӣбҹӢбһ…бҹҶбһҠбһ¶бһҷбһҺбһјбһҹбҹҗбһҡ бһ бһҫбһҷбһҠбһ¶бһҷбһҺбһјбһҹбҹҗбһҡбһӣбҹ„бһҸбһҳбһ·бһ“бһ•бһ»бһҸ
    if (kaktusLeft > 50 && kaktusLeft < 100 && dinoBottom <= 15) {
        isAlive = false;
        kaktus.classList.remove('kaktus-move'); // бһұбҹ’бһҷбһҠбҹҶбһ”бһ„бһҷбһҖбҹ’бһҹбһҲбһ”бҹӢбһҡбһҸбҹӢ
        startBtn.style.display = 'block'; // бһ”бһ„бҹ’бһ бһ¶бһүбһ”бҹҠбһјбһҸбһ»бһ„бһӣбҹҒбһ„бһЎбһҫбһ„бһңбһ·бһү
        startBtn.innerText = 'Restart';
        alert('Game Over! бһ…бһ»бһ… Restart бһҠбһҫбһҳбҹ’бһ”бһёбһӣбҹҒбһ„бһҳбҹ’бһҸбһ„бһ‘бҹҖбһҸбҹ”');
    }
}, 10);
    </script>
</body>

</html>
