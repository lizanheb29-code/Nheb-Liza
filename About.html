<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Owner Information</title>
    <style>
        body {
            background: #d6b9b9;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;

            background-color: #0807;
            overflow-x: hidden;
            position: relative;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;


            background: radial-gradient(circle, #d4af37 0%, #aa7c11 50%, transparent 70%);
            animation: moveGold1 22s infinite alternate ease-in-out;
        }
        button {
            height: 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;

        }


        .profile-box {
            width: 320px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .profile-box img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #4facfe;
            object-fit: cover;
        }

        .profile-box h1 {
            margin-top: 15px;
            color: #333;
        }

        .profile-box p {
            color: gray;
            margin: 5px 0;
        }

        .info {
            margin-top: 20px;
            text-align: left;
        }

        .info div {
            background: #f7f7f7;
            /* គម្លាតអក្សរ */
            padding: 10px;
            /* កាត់ប្រអប់ជាកង់ */
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            /* កាត់ប្រអប់គែមចេញ */
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="profile-box">
        <img src="image/3.png" alt="profile-box">
        <h1>Liza Nheb</h1>
        <p>Web Developer</p>
        <div class="info">
            <div><strong>Email:</strong>Yourname@gmail.com</div>
            <div><strong>Phone:</strong>0975642929</div>
            <div><strong>Phnom Penh</strong></div>
        </div>
        <button class="btn">Contact Me</button>
    </div>
    
</body>
</html>
