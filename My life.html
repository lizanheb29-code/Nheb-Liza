<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple Flowers</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
  --bg-color: #03010e;
  --purple-glow: #bd68ee;
  --purple-dark: #4a157d;
  --stem-color: #23083b;
}

body {
  background-color: var(--bg-color);
  min-height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
  margin: 0;
}

.night {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(147, 51, 234, 0.15) 0%, transparent 80%);
  z-index: 1;
}

.flowers {
  position: relative;
  transform: scale(0.9);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  min-height: 600px;
  width: 100%;
  z-index: 2;
  padding-bottom: 100px; /* ការពារកុំឱ្យបាំងជាមួយ Taskbar កុំព្យូទ័រ */
}

/* --- ការរៀបចំទម្រង់ផ្កា --- */
.flower {
  position: absolute;
  bottom: 0;
  transform-origin: bottom center;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.flower--1 {
  animation: moving-flower-1 4s linear infinite;
}

.flower--2 {
  animation: moving-flower-1 5s linear infinite;
  animation-delay: 0.3s;
  transform: scale(0.8) translateX(-100px);
}

/* --- ដើមផ្កា --- */
.flower__line {
  width: 6px;
  height: 300px;
  background-image: linear-gradient(to top, rgba(0,0,0,0), var(--stem-color));
  box-shadow: 0 0 10px rgba(189, 104, 238, 0.2);
  border-radius: 4px;
  position: relative;
}

/* --- ស្លឹកដុះតាមដើម --- */
.flowerlineleaf {
  position: absolute;
  width: 18px;
  height: 32px;
  background: var(--purple-dark);
  border-radius: 0 100% 0 100%;
}

.flowerlineleaf--1 {
  left: 5px;
  top: 40%;
  transform: rotate(30deg);
}

.flowerlineleaf--2 {
  right: 5px;
  top: 55%;
  transform: scaleX(-1) rotate(30deg);
}

.flowerlineleaf--3 {
  left: 5px;
  top: 30%;
  transform: rotate(20deg);
}

.flowerlineleaf--4 {
  right: 5px;
  top: 45%;
  transform: scaleX(-1) rotate(20deg);
}

/* --- បណ្តុំត្របកផ្កាខាងលើ --- */
.flower__leafs {
  position: absolute;
  top: 0; 
  transform: translateY(-50px); /* រុញបណ្តុំត្របកផ្កាឱ្យឡើងមកលើផុតដើម */
  width: 60px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* --- ស្រទាប់ត្របកផ្កានីមួយៗ --- */
.flower__leaf {
  position: absolute;
  width: 30px;
  height: 45px;
  background: linear-gradient(to bottom, var(--purple-glow), var(--purple-dark));
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  box-shadow: 0 0 20px rgba(189, 104, 238, 0.7);
  transform-origin: bottom center;
  bottom: 30px; /* ចងចំណុចកណ្តាល */
}

/* បង្វិលបង្កើតជាផ្ការីក ៤ ទិស */
.flower__leaf--1 { transform: rotate(0deg) translateY(-15px); }
.flower__leaf--2 { transform: rotate(90deg) translateY(-15px); }
.flower__leaf--3 { transform: rotate(180deg) translateY(-15px); }
.flower__leaf--4 { transform: rotate(270deg) translateY(-15px); }

/* --- គន្លឹះកណ្តាលផ្កាពណ៌ស --- */
.flower__white-circle {
  position: absolute;
  width: 12px;
  height: 12px;
  background-color: #fff;
  border-radius: 50%;
  box-shadow: 0 0 15px #fff, 0 0 25px var(--purple-glow);
  z-index: 20;
}

/* --- ចលនាបក់រេ --- */
@keyframes moving-flower-1 {
  0%, 100% {
    transform: rotate(-2deg);
  }
  50% {
    transform: rotate(2deg);
  }
}
  </style>
</head>
<body>
  <div class="night"></div>
  <div class="flowers">
    
    <div class="flower flower--1">
      <div class="flowerleafs flowerleafs--1">
        <div class="flowerleaf flowerleaf--1"></div>
        <div class="flowerleaf flowerleaf--2"></div>
        <div class="flowerleaf flowerleaf--3"></div>
        <div class="flowerleaf flowerleaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line">
        <div class="flowerlineleaf flowerlineleaf--1"></div>
        <div class="flowerlineleaf flowerlineleaf--2"></div>
      </div>
    </div>

    <div class="flower flower--2">
      <div class="flowerleafs flowerleafs--2">
        <div class="flowerleaf flowerleaf--1"></div>
        <div class="flowerleaf flowerleaf--2"></div>
        <div class="flowerleaf flowerleaf--3"></div>
        <div class="flowerleaf flowerleaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line">
        <div class="flowerlineleaf flowerlineleaf--3"></div>
        <div class="flowerlineleaf flowerlineleaf--4"></div>
      </div>
    </div>

  </div>
</body>
</html>
