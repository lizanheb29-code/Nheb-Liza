<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Remagine - Transform Text into Web Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        @import "tailwindcss";
@import "tw-animate-css";

@custom-variant dark (&:is(.dark *));

@theme inline {
  --radius-sm: calc(var(--radius) - 4px);
  --radius-md: calc(var(--radius) - 2px);
  --radius-lg: var(--radius);
  --radius-xl: calc(var(--radius) + 4px);
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-popover: var(--popover);
  --color-popover-foreground: var(--popover-foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-secondary: var(--secondary);
  --color-secondary-foreground: var(--secondary-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-accent: var(--accent);
  --color-accent-foreground: var(--accent-foreground);
  --color-destructive: var(--destructive);
  --color-destructive-foreground: var(--destructive-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --color-chart-1: var(--chart-1);
  --color-chart-2: var(--chart-2);
  --color-chart-3: var(--chart-3);
  --color-chart-4: var(--chart-4);
  --color-chart-5: var(--chart-5);
  --color-sidebar: var(--sidebar);
  --color-sidebar-foreground: var(--sidebar-foreground);
  --color-sidebar-primary: var(--sidebar-primary);
  --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
  --color-sidebar-accent: var(--sidebar-accent);
  --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
  --color-sidebar-border: var(--sidebar-border);
  --color-sidebar-ring: var(--sidebar-ring);
}

:root {
  --primary: #d946ef;
  --primary-foreground: #f0f0f0;
  --sidebar-primary: #d946ef;
  --sidebar-primary-foreground: #f0f0f0;
  --chart-1: #0ea5e9;
  --chart-2: #d946ef;
  --chart-3: #ec4899;
  --chart-4: #06b6d4;
  --chart-5: #8b5cf6;
  --radius: 0.5rem;
  --background: #0a0e27;
  --foreground: #f0f0f0;
  --card: #1a1f3a;
  --card-foreground: #f0f0f0;
  --popover: #1a1f3a;
  --popover-foreground: #f0f0f0;
  --secondary: #1f2937;
  --secondary-foreground: #d1d5db;
  --muted: #374151;
  --muted-foreground: #9ca3af;
  --accent: #d946ef;
  --accent-foreground: #0a0e27;
  --destructive: #ef4444;
  --destructive-foreground: #f0f0f0;
  --border: #2d3748;
  --input: #1f2937;
  --ring: #d946ef;
  --sidebar: #1a1f3a;
  --sidebar-foreground: #f0f0f0;
  --sidebar-accent: #d946ef;
  --sidebar-accent-foreground: #0a0e27;
  --sidebar-border: #2d3748;
  --sidebar-ring: #d946ef;
}

.dark {
  --primary: #d946ef;
  --primary-foreground: #f0f0f0;
  --sidebar-primary: #d946ef;
  --sidebar-primary-foreground: #f0f0f0;
  --background: #0a0e27;
  --foreground: #f0f0f0;
  --card: #1a1f3a;
  --card-foreground: #f0f0f0;
  --popover: #1a1f3a;
  --popover-foreground: #f0f0f0;
  --secondary: #1f2937;
  --secondary-foreground: #d1d5db;
  --muted: #374151;
  --muted-foreground: #9ca3af;
  --accent: #d946ef;
  --accent-foreground: #0a0e27;
  --destructive: #ef4444;
  --destructive-foreground: #f0f0f0;
  --border: #2d3748;
  --input: #1f2937;
  --ring: #d946ef;
  --chart-1: #0ea5e9;
  --chart-2: #d946ef;
  --chart-3: #ec4899;
  --chart-4: #06b6d4;
  --chart-5: #8b5cf6;
  --sidebar: #1a1f3a;
  --sidebar-foreground: #f0f0f0;
  --sidebar-accent: #d946ef;
  --sidebar-accent-foreground: #0a0e27;
  --sidebar-border: #2d3748;
  --sidebar-ring: #d946ef;
}

@layer base {
  * {
    @apply border-border outline-ring/50;
  }
  body {
    @apply bg-background text-foreground;
  }
  button:not(:disabled),
  [role="button"]:not([aria-disabled="true"]),
  [type="button"]:not(:disabled),
  [type="submit"]:not(:disabled),
  [type="reset"]:not(:disabled),
  a[href],
  select:not(:disabled),
  input[type="checkbox"]:not(:disabled),
  input[type="radio"]:not(:disabled) {
    @apply cursor-pointer;
  }
}

@layer components {
  .container {
    width: 100%;
    margin-left: auto;
    margin-right: auto;
    padding-left: 1rem;
    padding-right: 1rem;
  }

  .flex {
    min-height: 0;
    min-width: 0;
  }

  @media (min-width: 640px) {
    .container {
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
  }

  @media (min-width: 1024px) {
    .container {
      padding-left: 2rem;
      padding-right: 2rem;
      max-width: 1280px;
    }
  }

  /* Cyberpunk-specific utilities */
  .glow-neon {
    @apply shadow-lg;
    box-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
  }

  .glow-blue {
    box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
  }

  .glow-pink {
    box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
  }

  .neon-border {
    @apply border border-purple-500;
    box-shadow: inset 0 0 10px rgba(217, 70, 239, 0.3);
  }

  .neon-border-blue {
    @apply border border-cyan-500;
    box-shadow: inset 0 0 10px rgba(14, 165, 233, 0.3);
  }

  .tech-gradient {
    background: linear-gradient(135deg, rgba(217, 70, 239, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%);
  }

  .floating {
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-20px);
    }
  }

  .pulse-glow {
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% {
      box-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
    }
    50% {
      box-shadow: 0 0 30px rgba(217, 70, 239, 0.8);
    }
  }

  /* Scroll reveal animations */
  .scroll-reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
  }

  .scroll-reveal.animate-in {
    opacity: 1;
    transform: translateY(0);
  }

  /* Staggered animations for child elements */
  .scroll-reveal-stagger > * {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
  }

  .scroll-reveal-stagger.animate-in > * {
    opacity: 1;
    transform: translateY(0);
  }

  .scroll-reveal-stagger.animate-in > :nth-child(1) { transition-delay: 0ms; }
  .scroll-reveal-stagger.animate-in > :nth-child(2) { transition-delay: 100ms; }
  .scroll-reveal-stagger.animate-in > :nth-child(3) { transition-delay: 200ms; }
  .scroll-reveal-stagger.animate-in > :nth-child(4) { transition-delay: 300ms; }
  .scroll-reveal-stagger.animate-in > :nth-child(5) { transition-delay: 400ms; }
}

    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
